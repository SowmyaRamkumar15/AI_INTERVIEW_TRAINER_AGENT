server.port=${PORT:8080}

spring.application.name=interviora-backend

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Custom App Properties (JWT & File Upload)
app.jwt.secret=${JWT_SECRET}
app.jwt.expirationMs=${JWT_EXPIRATION_MS}
app.jwt.refreshExpirationMs=${JWT_REFRESH_EXPIRATION_MS}
app.file.upload-dir=${FILE_UPLOAD_DIR}

# IBM watsonx.ai + Orchestrate Integration
# API key: Orchestrate IAM key (ORCHESTRATE_IAM_APIKEY)
ibm.watsonx.api-key=${WATSONX_API_KEY}

# watsonx.ai Text Generation model
ibm.watsonx.model-id=${WATSONX_MODEL_ID}
ibm.watsonx.orchestrate.api-key=${WATSONX_ORCHESTRATE_API_KEY}
ibm.watsonx.orchestrate.instance-id=${WATSONX_ORCHESTRATE_INSTANCE_ID}
ibm.watsonx.orchestrate.region=${WATSONX_ORCHESTRATE_REGION}
ibm.watsonx.orchestrate.agent-id=${WATSONX_ORCHESTRATE_AGENT_ID}
ibm.watsonx.orchestrate.base-domain=${WATSONX_ORCHESTRATE_BASE_DOMAIN}

# RS256 private key used to sign JWTs for the WxO embed widget.
# The matching public key is registered in WxO portal: Embed Security -> Chat user identity.
ibm.watsonx.chat.private-key=${WATSONX_CHAT_PRIVATE_KEY}